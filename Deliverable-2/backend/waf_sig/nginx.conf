# nginx.conf — Production reverse proxy for Signature WAF
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m     rate=50r/s;

# Trust X-Forwarded-For from these upstream proxies / LBs
set_real_ip_from  10.0.0.0/8;
set_real_ip_from  172.16.0.0/12;
set_real_ip_from  192.168.0.0/16;
real_ip_header    X-Forwarded-For;
real_ip_recursive on;

upstream waf {
    server 127.0.0.1:5000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your.domain.com;

    # TLS — replace with your certificate paths
    ssl_certificate     /etc/ssl/certs/cert.pem;
    ssl_certificate_key /etc/ssl/private/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    server_tokens       off;
    client_max_body_size 10m;
    client_body_timeout  15s;
    client_header_timeout 15s;

    # Coarse rate limit before WAF
    limit_req zone=global burst=200 nodelay;

    # Block common bad paths at NGINX level (fast path, saves WAF work)
    location ~* \.(git|svn|hg|env|bak|sql|log|cfg)$ {
        return 404;
    }

    # Auth endpoints — strict rate limit
    location ~* ^/(login|signin|auth|token|oauth) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://waf;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check — no rate limit, no logging
    location /waf/health {
        proxy_pass         http://waf;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # Everything else → WAF
    location / {
        limit_req zone=api burst=100 nodelay;

        proxy_pass         http://waf;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_buffering       off;
    }
}
