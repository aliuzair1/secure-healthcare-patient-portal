# nginx.conf — Production NGINX configuration for AI-WAF-IDS
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Rate limiting zones (coarse pre-filter before WAF takes over)
limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m     rate=50r/s;

# Real IP (if behind a cloud LB / CDN — adjust to your trusted proxy CIDRs)
set_real_ip_from  10.0.0.0/8;
set_real_ip_from  172.16.0.0/12;
set_real_ip_from  192.168.0.0/16;
real_ip_header    X-Forwarded-For;
real_ip_recursive on;

upstream waf_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your.domain.com;

    # ── TLS (replace with your cert paths) ──────────────────────────
    ssl_certificate     /etc/ssl/certs/your_cert.pem;
    ssl_certificate_key /etc/ssl/private/your_key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-Frame-Options            "DENY" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=()" always;

    # Hide NGINX version
    server_tokens off;

    # ── Body size limit (pre-WAF DDoS protection) ───────────────────
    client_max_body_size  10m;
    client_body_timeout   15s;
    client_header_timeout 15s;
    send_timeout          15s;

    # ── Connection rate limits ───────────────────────────────────────
    limit_req zone=global burst=200 nodelay;

    # ── Proxy to WAF ─────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=100 nodelay;

        proxy_pass         http://waf_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_buffering off;
    }

    # ── Stricter rate limit on auth endpoints ────────────────────────
    location ~* ^/(login|signin|auth|token|oauth) {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://waf_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block common bad paths at NGINX level (fast path) ────────────
    location ~* \.(git|svn|hg|env|bak|sql|log|cfg)$ {
        return 404;
    }

    # ── WAF health check (no rate limit) ────────────────────────────
    location /waf/health {
        proxy_pass         http://waf_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }
}
